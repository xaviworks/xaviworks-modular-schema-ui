name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  package:
    name: Package PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version:
          - "8.4"
          - "8.5"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, sqlite3
          coverage: none
          tools: composer:v2

      - name: Validate Composer
        run: composer validate --strict --no-check-publish

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        run: composer test

      - name: Run formatting check
        run: composer lint

      - name: Run static analysis
        run: composer analyse

  workbench:
    name: Workbench tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, sqlite3
          coverage: none
          tools: composer:v2

      - name: Install workbench dependencies
        working-directory: workbench
        run: composer install --no-interaction --prefer-dist

      - name: Run workbench tests
        working-directory: workbench
        run: composer test

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        working-directory: workbench
        run: npm install --no-package-lock

      - name: Build frontend
        working-directory: workbench
        run: npm run build
